# CrowdSec Manager with Nginx Proxy Manager - Production Deployment Template
# Copy this file as docker-compose.yml and customize the .env file

version: "3.8"

services:
  # CrowdSec Security Engine
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      - GID=${GID:-1000}
      - COLLECTIONS=crowdsecurity/linux,crowdsecurity/nginx
      - ENROLL_INSTANCE_NAME=${ENROLL_INSTANCE_NAME:-crowdsec-manager-nginx}
      - ENROLL_TAGS=${ENROLL_TAGS:-docker,nginx}
    volumes:
      - ./config/crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - crowdsec-db:/var/lib/crowdsec/data/
      - crowdsec-config:/etc/crowdsec/
      - ./logs:/var/log:ro
    networks:
      - crowdsec-network
    healthcheck:
      test: ["CMD", "cscli", "capi", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # CrowdSec Manager - Web UI and API
  crowdsec-manager:
    image: crowdsec-manager/crowdsec-manager:2.0.0-nginx
    container_name: crowdsec-manager
    restart: unless-stopped
    ports:
      - "${MANAGER_PORT:-8080}:8080"
    environment:
      # Core Configuration
      - PORT=8080
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=/app/logs/crowdsec-manager.log
      - DOCKER_HOST=unix:///var/run/docker.sock
      - COMPOSE_FILE=/app/docker-compose.yml
      - CONFIG_DIR=/app/config
      - DATABASE_PATH=/app/data/settings.db

      # Proxy Configuration
      - PROXY_TYPE=nginx
      - PROXY_ENABLED=true
      - PROXY_CONTAINER_NAME=${NPM_CONTAINER_NAME:-nginx-proxy-manager}
      - COMPOSE_MODE=${COMPOSE_MODE:-single}

      # Nginx Proxy Manager Configuration
      - NPM_CONTAINER_NAME=${NPM_CONTAINER_NAME:-nginx-proxy-manager}
      - NPM_LOG_PATH=${NPM_LOG_PATH:-/data/logs}
      - NPM_CONFIG_PATH=${NPM_CONFIG_PATH:-/data}

      # CrowdSec Configuration
      - CROWDSEC_ACQUIS_FILE=/etc/crowdsec/acquis.yaml

      # Backup Configuration
      - BACKUP_DIR=/app/backups
      - RETENTION_DAYS=${RETENTION_DAYS:-60}
      - INCLUDE_CROWDSEC=${INCLUDE_CROWDSEC:-true}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/app/config
      - ./docker-compose.yml:/app/docker-compose.yml
      - ./backups:/app/backups
      - ./logs:/app/logs
      - ./data:/app/data
      - ./logs:/var/log:ro
      # NPM log access
      - ./data/npm:/data:ro
    networks:
      - crowdsec-network
    depends_on:
      crowdsec:
        condition: service_healthy

  # Nginx Proxy Manager
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:${NPM_VERSION:-latest}
    container_name: ${NPM_CONTAINER_NAME:-nginx-proxy-manager}
    restart: unless-stopped
    ports:
      - "${NPM_HTTP_PORT:-80}:80"
      - "${NPM_HTTPS_PORT:-443}:443"
      - "${NPM_ADMIN_PORT:-81}:81"
    environment:
      - DB_SQLITE_FILE=/data/database.sqlite
      - DISABLE_IPV6=${NPM_DISABLE_IPV6:-true}
    volumes:
      - ./data/npm:/data
      - ./config/letsencrypt:/etc/letsencrypt
      - ./logs/nginx:/data/logs
    networks:
      - crowdsec-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81/api"]
      interval: 30s
      timeout: 10s
      retries: 3

  # CrowdSec Nginx Bouncer (Optional - requires manual setup)
  # Uncomment and configure after NPM setup
  # nginx-bouncer:
  #   image: crowdsecurity/cs-nginx-bouncer:latest
  #   container_name: nginx-bouncer
  #   restart: unless-stopped
  #   environment:
  #     - CROWDSEC_BOUNCER_API_KEY=${CROWDSEC_BOUNCER_API_KEY}
  #     - CROWDSEC_AGENT_HOST=crowdsec:8080
  #   volumes:
  #     - ./config/nginx-bouncer:/etc/crowdsec/bouncers/
  #   networks:
  #     - crowdsec-network
  #   depends_on:
  #     - crowdsec
  #     - nginx-proxy-manager

networks:
  crowdsec-network:
    driver: bridge
    name: ${NETWORK_NAME:-crowdsec-network}

volumes:
  crowdsec-db:
    name: ${CROWDSEC_DB_VOLUME:-crowdsec-db}
  crowdsec-config:
    name: ${CROWDSEC_CONFIG_VOLUME:-crowdsec-config}
