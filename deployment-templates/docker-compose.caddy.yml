# CrowdSec Manager with Caddy - Production Deployment Template
# Copy this file as docker-compose.yml and customize the .env file

version: "3.8"

services:
  # CrowdSec Security Engine
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      - GID=${GID:-1000}
      - COLLECTIONS=crowdsecurity/linux,crowdsecurity/caddy
      - ENROLL_INSTANCE_NAME=${ENROLL_INSTANCE_NAME:-crowdsec-manager-caddy}
      - ENROLL_TAGS=${ENROLL_TAGS:-docker,caddy}
    volumes:
      - ./config/crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - crowdsec-db:/var/lib/crowdsec/data/
      - crowdsec-config:/etc/crowdsec/
      - ./logs:/var/log:ro
    networks:
      - crowdsec-network
    healthcheck:
      test: ["CMD", "cscli", "capi", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # CrowdSec Manager - Web UI and API
  crowdsec-manager:
    image: crowdsec-manager/crowdsec-manager:2.0.0-caddy
    container_name: crowdsec-manager
    restart: unless-stopped
    ports:
      - "${MANAGER_PORT:-8080}:8080"
    environment:
      # Core Configuration
      - PORT=8080
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=/app/logs/crowdsec-manager.log
      - DOCKER_HOST=unix:///var/run/docker.sock
      - COMPOSE_FILE=/app/docker-compose.yml
      - CONFIG_DIR=/app/config
      - DATABASE_PATH=/app/data/settings.db

      # Proxy Configuration
      - PROXY_TYPE=caddy
      - PROXY_ENABLED=true
      - PROXY_CONTAINER_NAME=${CADDY_CONTAINER_NAME:-caddy}
      - COMPOSE_MODE=${COMPOSE_MODE:-single}

      # Caddy Configuration
      - CADDY_CONTAINER_NAME=${CADDY_CONTAINER_NAME:-caddy}
      - CADDY_CONFIG_PATH=${CADDY_CONFIG_PATH:-/etc/caddy/Caddyfile}
      - CADDY_DATA_PATH=${CADDY_DATA_PATH:-/data}
      - CADDY_ADMIN_ENDPOINT=${CADDY_ADMIN_ENDPOINT:-http://caddy:2019}

      # CrowdSec Configuration
      - CROWDSEC_ACQUIS_FILE=/etc/crowdsec/acquis.yaml

      # Backup Configuration
      - BACKUP_DIR=/app/backups
      - RETENTION_DAYS=${RETENTION_DAYS:-60}
      - INCLUDE_CROWDSEC=${INCLUDE_CROWDSEC:-true}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/app/config
      - ./docker-compose.yml:/app/docker-compose.yml
      - ./backups:/app/backups
      - ./logs:/app/logs
      - ./data:/app/data
      - ./logs:/var/log:ro
    networks:
      - crowdsec-network
    depends_on:
      crowdsec:
        condition: service_healthy

  # Caddy Reverse Proxy with CrowdSec Bouncer
  caddy:
    image: caddy:${CADDY_VERSION:-latest}-builder AS builder
    container_name: ${CADDY_CONTAINER_NAME:-caddy}
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_ADMIN_PORT:-2019}:2019"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./config/caddy:/config
      - ./logs/caddy:/var/log/caddy
    networks:
      - crowdsec-network
    environment:
      - CADDY_ADMIN=${CADDY_ADMIN:-0.0.0.0:2019}
      # CrowdSec Bouncer Configuration
      - CROWDSEC_BOUNCER_API_KEY=${CROWDSEC_BOUNCER_API_KEY}
      - CROWDSEC_AGENT_HOST=crowdsec:8080
    # Build Caddy with CrowdSec bouncer module
    build:
      context: .
      dockerfile_inline: |
        FROM caddy:${CADDY_VERSION:-latest}-builder AS builder
        RUN xcaddy build \
            --with github.com/hslatman/caddy-crowdsec-bouncer/http

        FROM caddy:${CADDY_VERSION:-latest}
        COPY --from=builder /usr/bin/caddy /usr/bin/caddy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  crowdsec-network:
    driver: bridge
    name: ${NETWORK_NAME:-crowdsec-network}

volumes:
  crowdsec-db:
    name: ${CROWDSEC_DB_VOLUME:-crowdsec-db}
  crowdsec-config:
    name: ${CROWDSEC_CONFIG_VOLUME:-crowdsec-config}
