# CrowdSec Manager with HAProxy - Production Deployment Template
# Copy this file as docker-compose.yml and customize the .env file

version: "3.8"

services:
  # CrowdSec Security Engine
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      - GID=${GID:-1000}
      - COLLECTIONS=crowdsecurity/linux,crowdsecurity/haproxy
      - ENROLL_INSTANCE_NAME=${ENROLL_INSTANCE_NAME:-crowdsec-manager-haproxy}
      - ENROLL_TAGS=${ENROLL_TAGS:-docker,haproxy}
    volumes:
      - ./config/crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - crowdsec-db:/var/lib/crowdsec/data/
      - crowdsec-config:/etc/crowdsec/
      - ./logs:/var/log:ro
    networks:
      - crowdsec-network
    healthcheck:
      test: ["CMD", "cscli", "capi", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # CrowdSec Manager - Web UI and API
  crowdsec-manager:
    image: crowdsec-manager/crowdsec-manager:2.0.0-haproxy
    container_name: crowdsec-manager
    restart: unless-stopped
    ports:
      - "${MANAGER_PORT:-8080}:8080"
    environment:
      # Core Configuration
      - PORT=8080
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=/app/logs/crowdsec-manager.log
      - DOCKER_HOST=unix:///var/run/docker.sock
      - COMPOSE_FILE=/app/docker-compose.yml
      - CONFIG_DIR=/app/config
      - DATABASE_PATH=/app/data/settings.db

      # Proxy Configuration
      - PROXY_TYPE=haproxy
      - PROXY_ENABLED=true
      - PROXY_CONTAINER_NAME=${HAPROXY_CONTAINER_NAME:-haproxy}
      - COMPOSE_MODE=${COMPOSE_MODE:-single}

      # HAProxy Configuration
      - HAPROXY_CONTAINER_NAME=${HAPROXY_CONTAINER_NAME:-haproxy}
      - HAPROXY_CONFIG_PATH=${HAPROXY_CONFIG_PATH:-/usr/local/etc/haproxy/haproxy.cfg}
      - HAPROXY_STATS_ENDPOINT=${HAPROXY_STATS_ENDPOINT:-http://haproxy:8404/stats}
      - HAPROXY_SPOA_SOCKET=${HAPROXY_SPOA_SOCKET:-/var/run/crowdsec/crowdsec.sock}

      # CrowdSec Configuration
      - CROWDSEC_ACQUIS_FILE=/etc/crowdsec/acquis.yaml

      # Backup Configuration
      - BACKUP_DIR=/app/backups
      - RETENTION_DAYS=${RETENTION_DAYS:-60}
      - INCLUDE_CROWDSEC=${INCLUDE_CROWDSEC:-true}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/app/config
      - ./docker-compose.yml:/app/docker-compose.yml
      - ./backups:/app/backups
      - ./logs:/app/logs
      - ./data:/app/data
      - ./logs:/var/log:ro
      # SPOA socket access
      - crowdsec-spoa:/var/run/crowdsec
    networks:
      - crowdsec-network
    depends_on:
      crowdsec:
        condition: service_healthy

  # HAProxy Load Balancer
  haproxy:
    image: haproxy:${HAPROXY_VERSION:-latest}
    container_name: ${HAPROXY_CONTAINER_NAME:-haproxy}
    restart: unless-stopped
    ports:
      - "${HAPROXY_HTTP_PORT:-80}:80"
      - "${HAPROXY_HTTPS_PORT:-443}:443"
      - "${HAPROXY_STATS_PORT:-8404}:8404"
    volumes:
      - ./config/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./config/haproxy/certs:/etc/ssl/certs:ro
      - ./logs/haproxy:/var/log/haproxy
      # SPOA socket for CrowdSec bouncer
      - crowdsec-spoa:/var/run/crowdsec
    networks:
      - crowdsec-network
    environment:
      - HAPROXY_STATS_USER=${HAPROXY_STATS_USER:-admin}
      - HAPROXY_STATS_PASSWORD=${HAPROXY_STATS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8404/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - crowdsec-haproxy-bouncer

  # CrowdSec HAProxy SPOA Bouncer
  crowdsec-haproxy-bouncer:
    image: crowdsecurity/cs-haproxy-bouncer:${HAPROXY_BOUNCER_VERSION:-latest}
    container_name: crowdsec-haproxy-bouncer
    restart: unless-stopped
    environment:
      # CrowdSec Configuration
      - CROWDSEC_BOUNCER_API_KEY=${CROWDSEC_BOUNCER_API_KEY}
      - CROWDSEC_AGENT_HOST=crowdsec
      - CROWDSEC_AGENT_PORT=8080

      # SPOA Configuration
      - SPOA_LISTEN_ADDR=0.0.0.0:9000
      - SPOA_SOCKET_PATH=/var/run/crowdsec/crowdsec.sock

      # Bouncer Configuration
      - BOUNCER_CONFIG=/etc/crowdsec/bouncers/crowdsec-haproxy-bouncer.yaml
      - LOG_LEVEL=${HAPROXY_BOUNCER_LOG_LEVEL:-info}
    volumes:
      - ./config/haproxy-bouncer:/etc/crowdsec/bouncers:ro
      - crowdsec-spoa:/var/run/crowdsec
    networks:
      - crowdsec-network
    depends_on:
      crowdsec:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-S", "/var/run/crowdsec/crowdsec.sock"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  crowdsec-network:
    driver: bridge
    name: ${NETWORK_NAME:-crowdsec-network}

volumes:
  crowdsec-db:
    name: ${CROWDSEC_DB_VOLUME:-crowdsec-db}
  crowdsec-config:
    name: ${CROWDSEC_CONFIG_VOLUME:-crowdsec-config}
  crowdsec-spoa:
    name: ${CROWDSEC_SPOA_VOLUME:-crowdsec-spoa}
