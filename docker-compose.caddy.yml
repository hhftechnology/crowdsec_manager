version: "3.8"

# CrowdSec Manager - Caddy Proxy Services (Separate Deployment Mode)
# This file contains Caddy reverse proxy service
# Usage: docker-compose -f docker-compose.caddy.yml up

services:
  # Caddy Reverse Proxy
  caddy:
    image: caddy:${CADDY_VERSION:-latest}
    container_name: ${CADDY_CONTAINER_NAME:-caddy}
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_ADMIN_PORT:-2019}:2019"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./config/caddy:/config
      - ./logs/caddy:/var/log/caddy
    networks:
      - crowdsec-network
    environment:
      - CADDY_ADMIN=${CADDY_ADMIN:-0.0.0.0:2019}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  crowdsec-network:
    name: ${NETWORK_NAME:-crowdsec-network}
    external: true
