# =============================================================================
# Tailscale Auth Key Secret
# =============================================================================
# DO NOT commit this file with a real auth key. Either:
#   1. Generate it from the template below and apply manually, OR
#   2. Use the imperative command:
#        kubectl create secret generic crowdsec-manager-tailscale \
#          --namespace crowdsec \
#          --from-literal=TS_AUTHKEY="tskey-auth-XXXX"
#
# To get a reusable auth key: https://login.tailscale.com/admin/settings/keys
# Enable "Reusable" so the Pod can re-authenticate if the state PVC is lost.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: crowdsec-manager-tailscale
  namespace: crowdsec
  labels:
    app.kubernetes.io/name: crowdsec-manager
    app.kubernetes.io/component: tailscale
  annotations:
    # Prevent accidental deletion — delete manually if you want a full teardown.
    # kubectl delete secret crowdsec-manager-tailscale -n crowdsec
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  TS_AUTHKEY: "tskey-auth-REPLACE_ME"
