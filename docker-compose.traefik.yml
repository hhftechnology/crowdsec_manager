version: "3.8"

# CrowdSec Manager - Traefik Proxy Services (Separate Deployment Mode)
# This file contains Traefik and optional add-on services
# Usage: docker-compose -f docker-compose.traefik.yml up
# With add-ons: docker-compose -f docker-compose.traefik.yml -f docker-compose.traefik-addons.yml up

services:
  # Traefik Reverse Proxy
  traefik:
    image: traefik:${TRAEFIK_VERSION:-latest}
    container_name: ${TRAEFIK_CONTAINER_NAME:-traefik}
    restart: unless-stopped
    stop_grace_period: 60s
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8081}:8080"
    command:
      - "--api.insecure=${TRAEFIK_API_INSECURE:-true}"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.transport.lifecycle.gracetimeout=60s"
      - "--entrypoints.websecure.transport.lifecycle.gracetimeout=60s"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--log.level=${TRAEFIK_LOG_LEVEL:-INFO}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik:/etc/traefik:ro
      - ./logs/traefik:/var/log/traefik
    networks:
      - crowdsec-network
    environment:
      - CROWDSEC_COLLECTIONS=crowdsecurity/traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`${TRAEFIK_HOST:-traefik.localhost}`)"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.routers.traefik.service=api@internal"

networks:
  crowdsec-network:
    name: ${NETWORK_NAME:-crowdsec-network}
    external: true
