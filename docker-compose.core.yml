version: "3.8"

# CrowdSec Manager - Core Services (Separate Deployment Mode)
# This file contains CrowdSec core and Manager services only
# Usage: docker-compose -f docker-compose.core.yml up

services:
  # CrowdSec Security Engine
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      - GID=${GID:-1000}
      - COLLECTIONS=${CROWDSEC_COLLECTIONS:-crowdsecurity/linux}
      - ENROLL_INSTANCE_NAME=${ENROLL_INSTANCE_NAME:-crowdsec-manager}
      - ENROLL_TAGS=${ENROLL_TAGS:-docker}
    volumes:
      - ./config/crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - crowdsec-db:/var/lib/crowdsec/data/
      - crowdsec-config:/etc/crowdsec/
      # Proxy logs (mounted based on proxy type)
      - ./logs:/var/log:ro
    networks:
      - crowdsec-network
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "cscli", "capi", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # CrowdSec Manager - Web UI and API
  crowdsec-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crowdsec-manager
    restart: unless-stopped
    ports:
      - "${MANAGER_PORT:-8080}:8080"
    environment:
      # Core Configuration
      - PORT=8080
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=/app/logs/crowdsec-manager.log
      - DOCKER_HOST=unix:///var/run/docker.sock
      - COMPOSE_FILE=/app/docker-compose.yml
      - CONFIG_DIR=/app/config
      - DATABASE_PATH=/app/data/settings.db

      # Multi-Proxy Configuration
      - PROXY_TYPE=${PROXY_TYPE:-standalone}
      - PROXY_ENABLED=${PROXY_ENABLED:-false}
      - PROXY_CONTAINER_NAME=${PROXY_CONTAINER_NAME:-}
      - COMPOSE_MODE=separate

      # CrowdSec Configuration
      - CROWDSEC_ACQUIS_FILE=/etc/crowdsec/acquis.yaml

      # Backup Configuration
      - BACKUP_DIR=/app/backups
      - RETENTION_DAYS=${RETENTION_DAYS:-60}
      - INCLUDE_CROWDSEC=${INCLUDE_CROWDSEC:-true}
    volumes:
      # Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # Configuration files
      - ./config:/app/config
      # Docker compose file
      - ./docker-compose.core.yml:/app/docker-compose.yml
      # Backups
      - ./backups:/app/backups
      # Logs
      - ./logs:/app/logs
      # Database for settings
      - ./data:/app/data
      # Proxy logs (read-only access)
      - ./logs:/var/log:ro
    networks:
      - crowdsec-network
    depends_on:
      crowdsec:
        condition: service_healthy

networks:
  crowdsec-network:
    driver: bridge
    name: ${NETWORK_NAME:-crowdsec-network}
    external: false

volumes:
  crowdsec-db:
    name: ${CROWDSEC_DB_VOLUME:-crowdsec-db}
  crowdsec-config:
    name: ${CROWDSEC_CONFIG_VOLUME:-crowdsec-config}
