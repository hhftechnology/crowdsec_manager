services:
  crowdsec-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crowdsec-manager-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/app/data
    environment:
      - PORT=8080
      - PROXY_TYPE=${PROXY_TYPE:-}
      - CROWDSEC_CONTAINER=${CROWDSEC_CONTAINER:-crowdsec}
      - PROXY_CONTAINER=${PROXY_CONTAINER:-traefik}
      - LOG_LEVEL=debug
      - DEV_MODE=true
    networks:
      - crowdsec-net

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    volumes:
      - ./data/crowdsec-config:/etc/crowdsec
      - ./data/crowdsec-data:/var/lib/crowdsec/data
    environment:
      - COLLECTIONS=crowdsecurity/traefik crowdsecurity/http-cve
    networks:
      - crowdsec-net

  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/traefik-config:/etc/traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--accesslog=true"
      - "--log.level=DEBUG"
    networks:
      - crowdsec-net

networks:
  crowdsec-net:
    driver: bridge
