version: '3.8'

# Development docker-compose configuration
# Usage: docker-compose -f docker-compose.dev.yml up

services:
  crowdsec-manager-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: crowdsec-manager-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "5173:5173"
    environment:
      - PORT=8080
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - LOG_FILE=/app/logs/crowdsec-manager.log
      - DOCKER_HOST=unix:///var/run/docker.sock
      - CONFIG_DIR=/app/config
      - DATABASE_PATH=/app/data/settings.db
      - INCLUDE_CROWDSEC=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./cmd:/app/cmd
      - ./internal:/app/internal
      - ./web:/app/web
      - ./config:/app/config
      - ./logs:/app/logs
      - ./data:/app/data
      - go-modules:/go/pkg/mod
    networks:
      - crowdsec-network
    depends_on:
      - crowdsec
    command: >
      sh -c "
        cd /app &&
        go install github.com/cosmtrek/air@latest &&
        cd /app/web && npm install && npm run dev &
        cd /app && air -c configs/.air.toml
      "

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      - GID=${GID-1000}
      - COLLECTIONS=crowdsecurity/linux
    volumes:
      - ./config/crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - crowdsec-db:/var/lib/crowdsec/data/
      - crowdsec-config:/etc/crowdsec/
    networks:
      - crowdsec-network

networks:
  crowdsec-network:
    driver: bridge

volumes:
  crowdsec-db:
  crowdsec-config:
  go-modules:
