apiVersion: v1
kind: Service
metadata:
  name: {{ include "crowdsec-manager.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crowdsec-manager.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # ClusterIP only — external access is exclusively via Tailscale VPN.
  # Reachable at http://<tailscale-ip>:8080 from your tailnet.
  type: {{ .Values.service.type }}
  selector:
    {{- include "crowdsec-manager.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
