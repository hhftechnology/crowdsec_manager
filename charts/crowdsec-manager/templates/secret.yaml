{{- if not .Values.tailscaleSecret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-tailscale" (include "crowdsec-manager.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crowdsec-manager.labels" . | nindent 4 }}
  annotations:
    # Preserve the Tailscale identity across helm uninstall / upgrade cycles.
    # Delete manually if you want a full teardown:
    #   kubectl delete secret {{ printf "%s-tailscale" (include "crowdsec-manager.fullname" .) }} -n {{ .Release.Namespace }}
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  TS_AUTHKEY: {{ required "tailscaleSecret.authKey is required when tailscaleSecret.existingSecret is not set.\nProvide it with: --set tailscaleSecret.authKey=tskey-auth-XXXX" .Values.tailscaleSecret.authKey | quote }}
{{- end }}
{{- if and .Values.app.nats.enabled (not .Values.natsSecret.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-nats" (include "crowdsec-manager.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crowdsec-manager.labels" . | nindent 4 }}
type: Opaque
stringData:
  NATS_TOKEN: {{ .Values.natsSecret.token | quote }}
{{- end }}
