version: "3.8"

# CrowdSec Manager - Zoraxy Proxy Services (Separate Deployment Mode)
# This file contains Zoraxy reverse proxy service (EXPERIMENTAL)
# Usage: docker-compose -f docker-compose.zoraxy.yml up

services:
  # Zoraxy Reverse Proxy (Experimental)
  zoraxy:
    image: zoraxydocker/zoraxy:${ZORAXY_VERSION:-latest}
    container_name: ${ZORAXY_CONTAINER_NAME:-zoraxy}
    restart: unless-stopped
    ports:
      - "${ZORAXY_HTTP_PORT:-80}:80"
      - "${ZORAXY_HTTPS_PORT:-443}:443"
      - "${ZORAXY_ADMIN_PORT:-8000}:8000"
    volumes:
      - ./config/zoraxy:/opt/zoraxy/config
      - ./data/zoraxy:/opt/zoraxy/data
      - ./logs/zoraxy:/opt/zoraxy/logs
    networks:
      - crowdsec-network
    environment:
      - ZORAXY_PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/info"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  crowdsec-network:
    name: ${NETWORK_NAME:-crowdsec-network}
    external: true
